<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Stock Chantier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --warning-color: #e74c3c;
            --light-bg: #ecf0f1;
            --border-color: #bdc3c7;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--primary-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        section {
            padding: 30px 20px;
            border-bottom: 1px solid var(--light-bg);
        }

        section h2 {
            color: var(--primary-color);
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        /* Formulaire */
        .add-section {
            background: #f8f9fa;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--primary-color);
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border-color);
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        /* Boutons */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--secondary-color);
            color: white;
            width: 100%;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-secondary {
            background: var(--success-color);
            color: white;
        }

        .btn-secondary:hover {
            background: #229954;
        }

        .btn-danger {
            background: var(--warning-color);
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-edit {
            background: #f39c12;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #e67e22;
        }

        /* Recherche */
        .search-section {
            background: #f8f9fa;
        }

        .search-row {
            display: grid;
            grid-template-columns: 1fr 200px 150px;
            gap: 15px;
        }

        .search-input {
            grid-column: 1;
        }

        .filter-select {
            grid-column: 2;
        }

        #exportBtn {
            grid-column: 3;
        }

        @media (max-width: 768px) {
            .search-row {
                grid-template-columns: 1fr;
            }

            .search-input,
            .filter-select,
            #exportBtn {
                grid-column: 1;
            }
        }

        /* Alertes */
        .alertes {
            padding: 20px;
            margin-bottom: 20px;
        }

        .alerte {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            color: #856404;
        }

        .alerte strong {
            color: #e74c3c;
        }

        /* Inventaire */
        .inventory-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .material-card {
            background: white;
            border: 2px solid var(--light-bg);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            animation: slideIn 0.3s ease-out;
        }

        .material-card:hover {
            border-color: var(--secondary-color);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transform: translateY(-5px);
        }

        .material-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .material-name {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary-color);
        }

        .category-badge {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .material-info {
            margin-bottom: 15px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--light-bg);
        }

        .info-label {
            font-weight: 600;
            color: #7f8c8d;
        }

        .info-value {
            color: var(--primary-color);
            font-weight: 700;
        }

        .quantity-low {
            color: var(--warning-color);
            font-weight: 700;
        }

        .material-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .material-actions button {
            flex: 1;
        }

        .empty-message {
            text-align: center;
            color: #7f8c8d;
            padding: 40px 20px;
            font-size: 1.1em;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .inventory-list {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            section {
                padding: 20px 15px;
            }

            .material-actions {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Gestion de Stock Chantier</h1>
            <p class="subtitle">Application pour Magasinier</p>
        </header>

        <!-- Section Ajout de Matériau -->
        <section class="add-section">
            <h2>➕ Ajouter un Matériau</h2>
            <form id="addForm">
                <div class="form-group">
                    <label for="nom">Nom du matériau:</label>
                    <input type="text" id="nom" required placeholder="Ex: Ciment, Briques, Acier...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="quantite">Quantité:</label>
                        <input type="number" id="quantite" required min="0" placeholder="0">
                    </div>

                    <div class="form-group">
                        <label for="unite">Unité:</label>
                        <select id="unite">
                            <option value="pcs">Pièce(s)</option>
                            <option value="kg">Kg</option>
                            <option value="m">Mètre(s)</option>
                            <option value="m2">M²</option>
                            <option value="m3">M³</option>
                            <option value="l">Litre(s)</option>
                            <option value="sac">Sac(s)</option>
                            <option value="palette">Palette(s)</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="categorie">Catégorie:</label>
                        <select id="categorie">
                            <option value="Matériaux">Matériaux</option>
                            <option value="Outils">Outils</option>
                            <option value="Équipement">Équipement</option>
                            <option value="Consommables">Consommables</option>
                            <option value="Sécurité">Sécurité</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="minAlert">Alerte stock faible:</label>
                        <input type="number" id="minAlert" min="0" placeholder="Ex: 10">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Ajouter le matériau</button>
            </form>
        </section>

        <!-- Section Recherche et Filtres -->
        <section class="search-section">
            <h2>🔍 Recherche et Filtres</h2>
            <div class="search-row">
                <input type="text" id="searchInput" placeholder="Rechercher un matériau..." class="search-input">
                <select id="filterCategorie" class="filter-select">
                    <option value="">Toutes les catégories</option>
                    <option value="Matériaux">Matériaux</option>
                    <option value="Outils">Outils</option>
                    <option value="Équipement">Équipement</option>
                    <option value="Consommables">Consommables</option>
                    <option value="Sécurité">Sécurité</option>
                    <option value="Autre">Autre</option>
                </select>
                <button id="exportBtn" class="btn btn-secondary">📥 Exporter CSV</button>
            </div>
        </section>

        <!-- Alertes de Stock Faible -->
        <div id="alertes" class="alertes"></div>

        <!-- Section Inventaire -->
        <section class="inventory-section">
            <h2>📋 Inventaire</h2>
            <div id="inventoryList" class="inventory-list"></div>
            <p id="emptyMessage" class="empty-message">Aucun matériau enregistré. Commencez par en ajouter un!</p>
        </section>
    </div>

    <script>
        // Gestion de Stock Chantier - Script Principal

        class StockManager {
            constructor() {
                this.materiaux = this.chargerDonnees();
                this.materiauEnEdition = null;
                this.init();
            }

            init() {
                this.attacherEvenements();
                this.afficherInventaire();
                this.afficherAlertes();
            }

            // ===== STOCKAGE LOCAL =====
            chargerDonnees() {
                const donnees = localStorage.getItem('stock_chantier');
                return donnees ? JSON.parse(donnees) : [];
            }

            sauvegarderDonnees() {
                localStorage.setItem('stock_chantier', JSON.stringify(this.materiaux));
            }

            // ===== ÉVÉNEMENTS =====
            attacherEvenements() {
                // Formulaire d'ajout
                document.getElementById('addForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.ajouterMateriau();
                });

                // Recherche
                document.getElementById('searchInput').addEventListener('input', () => {
                    this.afficherInventaire();
                });

                // Filtre catégorie
                document.getElementById('filterCategorie').addEventListener('change', () => {
                    this.afficherInventaire();
                });

                // Export CSV
                document.getElementById('exportBtn').addEventListener('click', () => {
                    this.exporterEnCSV();
                });
            }

            // ===== AJOUTER MATÉRIAU =====
            ajouterMateriau() {
                const nom = document.getElementById('nom').value.trim();
                const quantite = parseFloat(document.getElementById('quantite').value);
                const unite = document.getElementById('unite').value;
                const categorie = document.getElementById('categorie').value;
                const minAlert = parseFloat(document.getElementById('minAlert').value) || 0;

                if (!nom || quantite < 0) {
                    alert('Veuillez remplir tous les champs correctement!');
                    return;
                }

                const materiau = {
                    id: Date.now(),
                    nom,
                    quantite,
                    unite,
                    categorie,
                    minAlert,
                    dateAjout: new Date().toLocaleDateString('fr-FR'),
                    historique: [
                        {
                            date: new Date().toLocaleDateString('fr-FR'),
                            quantite,
                            action: 'Création'
                        }
                    ]
                };

                this.materiaux.push(materiau);
                this.sauvegarderDonnees();
                this.afficherInventaire();
                this.afficherAlertes();
                this.reinitialiserFormulaire();
            }

            // ===== MODIFIER MATÉRIAU =====
            editerMateriau(id) {
                const materiau = this.materiaux.find(m => m.id === id);
                if (!materiau) return;

                const nouvelleQuantite = prompt(`Nouvelle quantité pour ${materiau.nom}:`, materiau.quantite);
                if (nouvelleQuantite === null) return;

                const ancienneQuantite = materiau.quantite;
                materiau.quantite = parseFloat(nouvelleQuantite);

                if (isNaN(materiau.quantite)) {
                    alert('Quantité invalide!');
                    materiau.quantite = ancienneQuantite;
                    return;
                }

                const difference = materiau.quantite - ancienneQuantite;
                materiau.historique.push({
                    date: new Date().toLocaleDateString('fr-FR'),
                    quantite: materiau.quantite,
                    action: `Modification (${difference > 0 ? '+' : ''}${difference})`
                });

                this.sauvegarderDonnees();
                this.afficherInventaire();
                this.afficherAlertes();
            }

            // ===== SUPPRIMER MATÉRIAU =====
            supprimerMateriau(id) {
                const materiau = this.materiaux.find(m => m.id === id);
                if (!materiau) return;

                if (confirm(`Êtes-vous sûr de vouloir supprimer "${materiau.nom}"?`)) {
                    this.materiaux = this.materiaux.filter(m => m.id !== id);
                    this.sauvegarderDonnees();
                    this.afficherInventaire();
                    this.afficherAlertes();
                }
            }

            // ===== AFFICHAGE INVENTAIRE =====
            afficherInventaire() {
                const searchTerm = document.getElementById('searchInput').value.toLowerCase();
                const filterCategorie = document.getElementById('filterCategorie').value;
                const inventoryList = document.getElementById('inventoryList');
                const emptyMessage = document.getElementById('emptyMessage');

                let materiauxFiltres = this.materiaux.filter(m => {
                    const matchSearch = m.nom.toLowerCase().includes(searchTerm);
                    const matchCategorie = !filterCategorie || m.categorie === filterCategorie;
                    return matchSearch && matchCategorie;
                });

                inventoryList.innerHTML = '';

                if (materiauxFiltres.length === 0) {
                    emptyMessage.style.display = 'block';
                    return;
                }

                emptyMessage.style.display = 'none';

                materiauxFiltres.forEach(materiau => {
                    const card = this.creerCarteMateriau(materiau);
                    inventoryList.appendChild(card);
                });
            }

            creerCarteMateriau(materiau) {
                const card = document.createElement('div');
                card.className = 'material-card';
                
                const estFaible = materiau.quantite <= materiau.minAlert && materiau.minAlert > 0;
                const classeQuantite = estFaible ? 'quantity-low' : '';

                card.innerHTML = `
                    <div class="material-header">
                        <div class="material-name">${this.echapperHTML(materiau.nom)}</div>
                        <span class="category-badge">${this.echapperHTML(materiau.categorie)}</span>
                    </div>

                    <div class="material-info">
                        <div class="info-row">
                            <span class="info-label">Quantité:</span>
                            <span class="info-value ${classeQuantite}">
                                ${materiau.quantite} ${materiau.unite}
                                ${estFaible ? ' ⚠️' : ''}
                            </span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Alerte:</span>
                            <span class="info-value">${materiau.minAlert || 'Aucune'} ${materiau.unite}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Ajouté le:</span>
                            <span class="info-value">${materiau.dateAjout}</span>
                        </div>
                    </div>

                    <div class="material-actions">
                        <button class="btn btn-edit" onclick="stockManager.editerMateriau(${materiau.id})">
                            ✏️ Modifier
                        </button>
                        <button class="btn btn-danger" onclick="stockManager.supprimerMateriau(${materiau.id})">
                            🗑️ Supprimer
                        </button>
                    </div>
                `;

                return card;
            }

            // ===== ALERTES STOCK FAIBLE =====
            afficherAlertes() {
                const alertesDiv = document.getElementById('alertes');
                alertesDiv.innerHTML = '';

                const materiauxFaibles = this.materiaux.filter(m => 
                    m.minAlert > 0 && m.quantite <= m.minAlert
                );

                if (materiauxFaibles.length === 0) return;

                const titre = document.createElement('h3');
                titre.style.color = '#e74c3c';
                titre.innerHTML = '⚠️ Stocks Faibles - Action Requise';
                alertesDiv.appendChild(titre);

                materiauxFaibles.forEach(m => {
                    const alerte = document.createElement('div');
                    alerte.className = 'alerte';
                    alerte.innerHTML = `
                        <strong>${this.echapperHTML(m.nom)}</strong> 
                        (${m.categorie}) - Quantité actuelle: <strong>${m.quantite} ${m.unite}</strong> 
                        | Seuil d'alerte: ${m.minAlert} ${m.unite}
                    `;
                    alertesDiv.appendChild(alerte);
                });
            }

            // ===== EXPORT CSV =====
            exporterEnCSV() {
                if (this.materiaux.length === 0) {
                    alert('Aucun matériau à exporter!');
                    return;
                }

                let csv = 'Nom,Catégorie,Quantité,Unité,Alerte Stock,Date Ajout\n';

                this.materiaux.forEach(m => {
                    csv += `"${this.echapperCSV(m.nom)}","${m.categorie}","${m.quantite}","${m.unite}","${m.minAlert}","${m.dateAjout}"\n`;
                });

                const element = document.createElement('a');
                element.setAttribute('href', 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv));
                element.setAttribute('download', `inventaire_${new Date().toISOString().split('T')[0]}.csv`);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);

                alert('Inventaire exporté avec succès!');
            }

            // ===== UTILITAIRES =====
            reinitialiserFormulaire() {
                document.getElementById('addForm').reset();
                document.getElementById('quantite').value = '0';
                document.getElementById('unite').value = 'pcs';
                document.getElementById('categorie').value = 'Matériaux';
                document.getElementById('minAlert').value = '';
            }

            echapperHTML(texte) {
                const div = document.createElement('div');
                div.textContent = texte;
                return div.innerHTML;
            }

            echapperCSV(texte) {
                return texte.replace(/"/g, '""');
            }
        }

        // ===== INITIALISATION =====
        let stockManager;

        document.addEventListener('DOMContentLoaded', () => {
            stockManager = new StockManager();
            console.log('✅ Application de Gestion de Stock initialisée');
        });
    </script>
</body>
</html>
